<script>
        // Simple Interaction Logic
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            let startY = 0;
            let currentY = 0;

            main.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
            });

            main.addEventListener('touchmove', (e) => {
                currentY = e.touches[0].clientY;
                const diff = currentY - startY;
                if (diff > 0) {
                    main.style.transform = `translateY(${diff * 0.5}px)`;
                    main.style.opacity = `${1 - (diff / 1000)}`;
                }
            });

            main.addEventListener('touchend', (e) => {
                const diff = currentY - startY;
                if (diff > 150) {
                    // Close animation
                    main.style.transition = 'all 0.3s ease-out';
                    main.style.transform = 'translateY(100%)';
                    main.style.opacity = '0';
                    setTimeout(() => {
                        console.log('Modal Dismissed');
                        // In a real app, this would trigger the back/close function
                    }, 300);
                } else {
                    // Snap back
                    main.style.transition = 'all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    main.style.transform = 'translateY(0)';
                    main.style.opacity = '1';
                }
            });
        });
    </script>
